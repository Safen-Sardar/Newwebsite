<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium - Anti Vandalism</title>

<style>
body {
    margin:0;
    font-family:Arial;
    color:white;
    background: radial-gradient(circle at top, #111c33 0%, #0b1020 40%, #070a14 100%);
}

/* NAV */
nav {
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 20px;
    background:#0b1224;
    z-index:1000;
    position:relative;
}

.nav-left {
    display:flex;
    align-items:center;
    gap:10px;
}

.nav-left img {
    width:35px;
    height:35px;
    border-radius:50%;
    border:2px solid #38bdf8;
}

.nav-left h1 {
    margin:0;
    color:#38bdf8;
}

/* MENU */
.menu-icon { font-size:28px; cursor:pointer; }

.overlay {
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.6);
    display:none;
    z-index:998;
}

.overlay.active { display:block; }

.nav-menu {
    position:fixed;
    top:0;
    right:-300px;
    width:260px;
    height:100%;
    background:#0b1224;
    padding:25px;
    transition:0.3s;
    text-align:center;
    z-index:999;
}

.nav-menu.active { right:0; }

/* HERO */
.hero {
    text-align:center;
    padding:40px 20px;
}

.hero h2 { color:#38bdf8; }

/* REWARD (TOP NOW) */
.reward-section {
    text-align:center;
    padding:40px 20px;
}

.reward-box {
    margin:auto;
    margin-top:20px;
    padding:30px;
    max-width:400px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    border-radius:15px;
}

.reward-btn {
    margin-top:15px;
    padding:12px 20px;
    border:none;
    border-radius:10px;
    background:linear-gradient(90deg,#38bdf8,#a78bfa);
    color:black;
    cursor:pointer;
}

#reward-result {
    margin-top:15px;
    color:#22c55e;
}

/* PRICING */
.pricing {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:25px;
    padding:40px;
}

.card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    padding:30px;
    border-radius:18px;
    border:1px solid rgba(255,255,255,0.1);
    text-align:center;
}

.price {
    font-size:30px;
    color:#38bdf8;
}

/* CHECK */
.check {
    position:relative;
    padding-left:25px;
    margin:8px 0;
}

.check::before {
    content:"✔";
    position:absolute;
    left:0;
    color:#22c55e;
}

/* DISCOUNT BADGE */
.discount {
    background:#22c55e;
    color:black;
    padding:4px 8px;
    border-radius:6px;
    font-size:12px;
}

/* BUTTON */
.btn-buy {
    margin-top:15px;
    padding:12px 20px;
    border:1px solid #38bdf8;
    border-radius:10px;
    color:#38bdf8;
    text-decoration:none;
    display:inline-block;
}

/* FOOTER */
footer {
    background:#0b1224;
    padding:60px;
    text-align:center;
    margin-top:40px;
}
</style>
</head>

<body>

<nav>
<div class="nav-left">
<img src="https://via.placeholder.com/40">
<h1>Anti Vandalism</h1>
</div>
<div class="menu-icon" onclick="toggleMenu()">☰</div>
</nav>

<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<div class="nav-menu" id="menu">
<a href="index.html">Home</a>
<a href="Premium.html">Premium</a>
</div>

<section class="hero">
<h2>Premium Plans</h2>
</section>

<!-- 🎁 REWARD TOP -->
<section class="reward-section">
<h2>🎁 Daily Reward</h2>
<div class="reward-box">
<p>Open once per day</p>
<button onclick="openReward()" class="reward-btn">Open Box</button>
<div id="reward-result"></div>
</div>
</section>

<!-- PRICING -->
<section class="pricing">

<div class="card">
<h3>Basic</h3>
<div class="price">$1.99</div>
<p class="check">Anti-Raid</p>
<p class="check">Logs</p>
<a href="#" class="btn-buy">Buy</a>
</div>

<div class="card">
<h3>Pro</h3>
<div class="price">$4.99</div>
<p class="check">Anti-Nuke</p>
<p class="check">Full Logs</p>
<a href="#" class="btn-buy">Upgrade</a>
</div>

<div class="card">
<span class="discount">25% OFF</span>
<h3>Ultra</h3>
<div class="price"><del>$9.99</del> $7.49</div>
<p class="check">All Features</p>
<p class="check">AI Protection</p>
<a href="#" class="btn-buy">Get Ultra</a>
</div>

</section>

<footer>
© 2026 Anti Vandalism
</footer>

<script>
function toggleMenu(){
document.getElementById("menu").classList.toggle("active");
document.getElementById("overlay").classList.toggle("active");
}

function closeMenu(){
document.getElementById("menu").classList.remove("active");
document.getElementById("overlay").classList.remove("active");
}

/* 🎁 NEW REWARD SYSTEM */
function openReward(){

let last = localStorage.getItem("lastOpen");
let now = new Date().getTime();

if(last && now - last < 86400000){
document.getElementById("reward-result").innerHTML="❌ Try tomorrow!";
return;
}

localStorage.setItem("lastOpen", now);

let r = Math.random();
let reward = "";

/* 5 REWARDS (EDIT NAMES HERE) */
if(r < 0.02){
reward="🔥 Free Premium";
}
else if(r < 0.05){
reward="💎 Free Gold";
}
else if(r < 0.10){
reward="🤖 Free AI";
}
else if(r < 0.20){
reward="⚡ Free Silver";
}
else{
reward="😢 Nothing";
}

document.getElementById("reward-result").innerHTML = reward;

}
</script>

</body>
</html>
