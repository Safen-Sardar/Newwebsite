<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fixed Menu Bot</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0a0f1c;
    color:white;
    overflow-x:hidden;
}

/* NAV */
nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 20px;
    background:#0b1224;
    position:relative;
    z-index:1000;
}

nav h1{color:#38bdf8;}

/* MENU ICON */
.menu-icon{
    font-size:28px;
    cursor:pointer;
    z-index:1002;
}

/* OVERLAY */
.overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.6);
    display:none;
    z-index:998;
}

.overlay.active{
    display:block;
}

/* SIDE MENU (IMPORTANT FIX) */
.nav-menu{
    position:fixed;
    top:0;
    right:-300px;   /* مهم: hidden fully */
    width:260px;
    height:100%;
    background:#0b1224;
    padding:30px;
    transition:0.35s ease;
    z-index:999;
}

/* LINKS */
.nav-menu a{
    display:block;
    margin:20px 0;
    color:#38bdf8;
    text-decoration:none;
}

/* ACTIVE STATE */
.nav-menu.active{
    right:0;
}

/* HERO */
.hero{
    text-align:center;
    padding:90px 20px;
}

.hero h2{
    font-size:42px;
    background:linear-gradient(90deg,#38bdf8,#a78bfa);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

/* BUTTON */
.btn{
    padding:12px 20px;
    background:#38bdf8;
    color:black;
    border-radius:10px;
    text-decoration:none;
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
    <h1>Anti Vandalism</h1>
    <div class="menu-icon" onclick="openMenu()">☰</div>
</nav>

<!-- OVERLAY -->
<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<!-- MENU -->
<div class="nav-menu" id="menu">
    <a href="#">Home</a>
    <a href="#">Features</a>
    <a href="#">Support</a>
    <a href="#">Invite</a>
</div>

<!-- HERO -->
<section class="hero">
    <h2>Discord Security Bot</h2>
    <a class="btn">Add Bot</a>
</section>

<script>
function openMenu(){
    document.getElementById("menu").classList.add("active");
    document.getElementById("overlay").classList.add("active");
}

function closeMenu(){
    document.getElementById("menu").classList.remove("active");
    document.getElementById("overlay").classList.remove("active");
}
</script>

</body>
</html>
